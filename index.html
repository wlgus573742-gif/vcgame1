<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>심해 진주 줍기 게임</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="game-wrapper">
    <header class="game-header">
      <h1>심해 진주 줍기</h1>
      <p>스페이스바 또는 화면 클릭으로 장애물을 피하고 진주를 모으세요!</p>
    </header>

    <section class="info-panel">
      <div>점수: <span id="score">0</span></div>
      <div>목표: <span id="targetScore">15</span></div>
      <div>생명: <span id="life">3</span></div>
      <div>상태: <span id="gameStatus">대기</span></div>
    </section>

    <main id="gameArea" class="game-area">
      <div class="water-light light-one"></div>
      <div class="water-light light-two"></div>

      <div class="bubble bubble-one"></div>
      <div class="bubble bubble-two"></div>
      <div class="bubble bubble-three"></div>

      <div class="seaweed seaweed-one"></div>
      <div class="seaweed seaweed-two"></div>
      <div class="seaweed seaweed-three"></div>

      <div id="player" class="player">🤿</div>
      <div id="obstacle" class="obstacle">🪨</div>
      <div id="pearl" class="pearl">🦪</div>

      <div class="ground"></div>

      <div id="message" class="message">
        <strong>심해 진주 줍기</strong>
        <span>시작 버튼을 눌러 게임을 시작하세요.</span>
      </div>
    </main>

    <div class="button-row">
      <button id="startBtn" type="button">게임 시작</button>
      <button id="resetBtn" type="button">다시 시작</button>
      <button id="soundBtn" type="button">효과음 ON</button>
      <button id="bgmBtn" type="button">BGM ON</button>
    </div>

    <p class="guide-text">
      조작: 스페이스바 / 마우스 클릭 / 화면 터치
    </p>
  </div>

  <script src="script.js"></script>
</body>
</html>
