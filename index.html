<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>심해 진주 줍기 게임</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="game-wrapper">
    <header class="game-header">
      <h1>심해 진주 줍기</h1>
      <p>수심 10m에서 시작해 심해까지 내려가며 진주를 모으세요!</p>
    </header>

    <section class="info-panel">
      <div>점수: <span id="score">0</span></div>
      <div>목표: <span id="targetScore">15</span></div>
      <div>수심: <span id="depthName">10m</span></div>
      <div>단계: <span id="level">1</span> / 5</div>
      <div>생명: <span id="life">3</span></div>
      <div>상태: <span id="gameStatus">대기</span></div>
    </section>

    <section class="depth-track" aria-label="수심 단계">
      <div class="depth-step active" data-depth-step="1">
        <strong>1단계</strong>
        <span>10m 얕은 바다</span>
      </div>
      <div class="depth-step" data-depth-step="2">
        <strong>2단계</strong>
        <span>50m 산호 지대</span>
      </div>
      <div class="depth-step" data-depth-step="3">
        <strong>3단계</strong>
        <span>200m 어스름 해역</span>
      </div>
      <div class="depth-step" data-depth-step="4">
        <strong>4단계</strong>
        <span>1000m 암흑 해역</span>
      </div>
      <div class="depth-step" data-depth-step="5">
        <strong>5단계</strong>
        <span>심해</span>
      </div>
    </section>

    <main id="gameArea" class="game-area depth-1">
      <div class="water-light light-one"></div>
      <div class="water-light light-two"></div>
      <div class="water-light light-three"></div>

      <div class="bubble bubble-one"></div>
      <div class="bubble bubble-two"></div>
      <div class="bubble bubble-three"></div>
      <div class="bubble bubble-four"></div>

      <div class="seaweed seaweed-one"></div>
      <div class="seaweed seaweed-two"></div>
      <div class="seaweed seaweed-three"></div>
      <div class="seaweed seaweed-four"></div>

      <div id="player" class="player">🤿</div>
      <div id="pearl" class="pearl">🦪</div>

      <div id="obstacleOne" class="obstacle obstacle-one">🐠</div>
      <div id="obstacleTwo" class="obstacle obstacle-two">🪼</div>
      <div id="obstacleThree" class="obstacle obstacle-three">🦀</div>
      <div id="obstacleFour" class="obstacle obstacle-four">🐙</div>

      <div class="ground"></div>

      <div id="levelNotice" class="level-notice">수심 10m</div>

      <div id="message" class="message">
        <strong>심해 진주 줍기</strong>
        <span>10m 얕은 바다에서 시작해 심해까지 내려가세요.</span>
      </div>
    </main>

    <div class="button-row">
      <button id="startBtn" type="button">게임 시작</button>
      <button id="resetBtn" type="button">다시 시작</button>
      <button id="soundBtn" type="button">효과음 ON</button>
      <button id="bgmBtn" type="button">BGM ON</button>
    </div>

    <p class="guide-text">
      조작: 방향키 ↑ ↓ ← → / WASD / 모바일은 화면 아래 조작 버튼 사용
    </p>

    <section class="ranking-panel">
      <div class="ranking-title-row">
        <h2>플레이 랭킹 TOP 10</h2>
        <button id="clearRankingBtn" class="small-btn" type="button">랭킹 초기화</button>
      </div>
      <ol id="rankingList" class="ranking-list">
        <li class="empty-ranking">아직 기록이 없습니다.</li>
      </ol>
    </section>

    <div class="mobile-controls" aria-label="모바일 조작 버튼">
      <button class="control-btn up" data-key="ArrowUp" type="button">▲</button>
      <button class="control-btn left" data-key="ArrowLeft" type="button">◀</button>
      <button class="control-btn down" data-key="ArrowDown" type="button">▼</button>
      <button class="control-btn right" data-key="ArrowRight" type="button">▶</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
